# Solo para desarrollo local. En producción no hay Docker: Postgres y Storage son Supabase
# (ver tasks/DEPLOY.md). El servicio MinIO se retiró — nada en el código lo usaba ya
# (apps/api/src/storage tiene su propio fallback de disco local, sin Docker, para dev).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nucleo
      POSTGRES_PASSWORD: nucleo
      POSTGRES_DB: nucleo
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

volumes:
  pgdata:
