<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VITAE · Recruitment infrastructure</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

<style>
  /* ═══════════════════════════════════════════════════════════
     SISTEMA "CLEAR" — VITAE
     ═══════════════════════════════════════════════════════════ */
  :root {
    /* Superficies */
    --bg-canvas:        #F5F6F8;
    --bg-surface:       #FFFFFF;
    --bg-subtle:        #FAFBFC;
    --bg-sidebar:       #DCE2E8;
    --bg-sidebar-hover: #CCD4DD;
    --bg-hover:         #EDEFF2;

    /* Tinta */
    --ink-primary:      #0F1419;
    --ink-secondary:    #4B5563;
    --ink-tertiary:     #9CA3AF;
    --ink-disabled:     #D1D5DB;
    --ink-inverse:      #FFFFFF;

    /* Línea */
    --line:             #E5E7EB;
    --line-strong:      #D1D5DB;
    --line-subtle:      #F1F3F5;

    /* Acento */
    --accent:           #1FB6E8;
    --accent-hover:     #19A3D0;
    --accent-pressed:   #1390BA;
    --accent-soft:      #E1F4FB;
    --accent-ink:       #0C6B8A;

    /* Estados */
    --success:          #16A34A;
    --success-soft:     #DCFCE7;
    --warning:          #D97706;
    --warning-soft:     #FEF3C7;
    --danger:           #DC2626;
    --danger-soft:      #FEE2E2;
    --info:             #2563EB;
    --info-soft:        #DBEAFE;

    /* Sombras */
    --shadow-sm: 0 1px 2px rgba(15, 20, 25, 0.04);
    --shadow-md: 0 2px 4px rgba(15, 20, 25, 0.04), 0 4px 12px rgba(15, 20, 25, 0.04);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink-primary);
    background: var(--bg-canvas);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: 'cv11', 'ss01', 'ss03';
  }

  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .mono-tabular { font-variant-numeric: tabular-nums; }

  /* KPI cards · grid with reserved rows for aligned values */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .stat-card {
    background: var(--bg-surface);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 12px;
    min-height: 140px;
  }
  .stat-card.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .stat-label {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.35;
    min-height: calc(13px * 1.35 * 2);
    display: flex;
    align-items: flex-start;
  }
  .stat-card:not(.primary) .stat-label { color: var(--ink-secondary); }
  .stat-card.primary .stat-label { color: rgba(255,255,255,0.95); }
  .stat-value {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    align-self: end;
    font-variant-numeric: tabular-nums;
  }
  .stat-meta {
    font-size: 12px;
    color: var(--ink-tertiary);
    line-height: 1.4;
    min-height: 16px;
    display: flex;
    align-items: center;
  }
  .stat-card.primary .stat-meta { color: rgba(255,255,255,0.85); }
  .stat-delta {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    height: 20px;
    padding: 0 8px;
    border-radius: 9999px;
    font-size: 11px;
    font-weight: 500;
  }
  .stat-delta.positive { background: var(--success-soft); color: var(--success); }
  .stat-delta.negative { background: var(--danger-soft); color: var(--danger); }

  /* Shimmer for AI generation loading */
  @keyframes shimmer {
    0% { background-position: -1000px 0; }
    100% { background-position: 1000px 0; }
  }
  .shimmer {
    background: linear-gradient(90deg, var(--bg-subtle) 0%, var(--bg-hover) 50%, var(--bg-subtle) 100%);
    background-size: 2000px 100%;
    animation: shimmer 2s linear infinite;
  }

  /* Fade up */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.4s ease-out forwards; }

  /* Scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 5px; border: 2px solid var(--bg-canvas); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-tertiary); }

  /* Sidebar scrollbar — different track */
  aside ::-webkit-scrollbar-thumb { border-color: var(--bg-sidebar); }

  /* Suppress tailwind warning in console (cosmetic) */
</style>

</head>
