<style>
  :root {
    --bg-canvas:#F5F6F8; --bg-surface:#FFFFFF; --bg-subtle:#FAFBFC; --bg-sidebar:#DCE2E8; --bg-sidebar-hover:#CCD4DD; --bg-hover:#EDEFF2;
    --ink-primary:#0F1419; --ink-secondary:#4B5563; --ink-tertiary:#9CA3AF; --ink-disabled:#D1D5DB; --ink-inverse:#FFFFFF;
    --line:#E5E7EB; --line-strong:#D1D5DB; --line-subtle:#F1F3F5;
    --accent:#1FB6E8; --accent-hover:#19A3D0; --accent-pressed:#1390BA; --accent-soft:#E1F4FB; --accent-ink:#0C6B8A;
    --success:#16A34A; --success-soft:#DCFCE7; --warning:#D97706; --warning-soft:#FEF3C7; --danger:#DC2626; --danger-soft:#FEE2E2; --info:#2563EB; --info-soft:#DBEAFE;
    --shadow-sm:0 1px 2px rgba(15,20,25,0.04); --shadow-md:0 2px 4px rgba(15,20,25,0.04),0 4px 12px rgba(15,20,25,0.04);
  }
  * { box-sizing:border-box; }
  html, body { margin:0; padding:0; }
  body {
    font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    font-size:14px; line-height:1.5; color:var(--ink-primary); background:var(--bg-canvas);
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; font-feature-settings:'cv11','ss01','ss03';
  }
  .mono { font-family:'JetBrains Mono',ui-monospace,monospace; }
  .mono-tabular { font-variant-numeric:tabular-nums; }

  /* KPI cards */
  .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
  .stat-card { background:var(--bg-surface); border:1px solid var(--line); border-radius:12px; padding:20px; display:grid; grid-template-rows:auto 1fr auto; gap:12px; min-height:140px; }
  .stat-card.primary { background:var(--accent); border-color:var(--accent); color:white; }
  .stat-label { font-size:13px; font-weight:500; line-height:1.35; min-height:calc(13px*1.35*2); display:flex; align-items:flex-start; }
  .stat-card:not(.primary) .stat-label { color:var(--ink-secondary); }
  .stat-card.primary .stat-label { color:rgba(255,255,255,0.95); }
  .stat-value { font-size:32px; font-weight:700; letter-spacing:-0.02em; line-height:1; align-self:end; font-variant-numeric:tabular-nums; }
  .stat-meta { font-size:12px; color:var(--ink-tertiary); line-height:1.4; min-height:16px; display:flex; align-items:center; }
  .stat-card.primary .stat-meta { color:rgba(255,255,255,0.85); }
  .stat-delta { display:inline-flex; align-items:center; gap:4px; height:20px; padding:0 8px; border-radius:9999px; font-size:11px; font-weight:500; }
  .stat-delta.positive { background:var(--success-soft); color:var(--success); }
  .stat-delta.negative { background:var(--danger-soft); color:var(--danger); }

  /* ─────────── ORG CHART ─────────── */
  /* Lead cards are a fixed width so connector geometry (lead-center = 92px) is exact */
  .org-root { display:inline-flex; flex-direction:column; align-items:center; min-width:100%; }
  .org-card {
    display:flex; align-items:center; gap:9px; padding:9px 12px;
    background:var(--bg-surface); border:1px solid var(--line-strong); border-radius:10px;
    width:172px; transition:all 0.15s; cursor:pointer;
  }
  .org-card-lead { width:184px; border-color:var(--ink-primary); }
  .org-card:hover { border-color:var(--accent); box-shadow:0 2px 8px rgba(15,20,25,0.08); transform:translateY(-1px); }
  .org-card-lead:hover { border-color:var(--accent); }

  /* CEO → leads bus */
  .org-bus { display:flex; gap:20px; position:relative; margin-top:46px; align-items:flex-start; }
  /* CEO vertical drop into the bus */
  .org-bus::before {
    content:''; position:absolute; top:-24px; left:50%; transform:translateX(-1px);
    width:2px; height:24px; background:var(--line-strong);
  }
  .org-col { display:flex; flex-direction:column; align-items:flex-start; position:relative; }
  /* horizontal bus segment over each column (overlaps half the 20px gap on each side) */
  .org-col::after {
    content:''; position:absolute; top:-24px; left:-10px; right:-10px; height:2px; background:var(--line-strong);
  }
  /* trim outer ends of the bus to each outer lead's center (92px from col-left) */
  .org-bus > .org-col:first-child::after { left:92px; }
  .org-bus > .org-col:last-child::after { right:calc(100% - 92px); }
  /* vertical stub from bus down to each lead card (at lead center) */
  .org-col::before {
    content:''; position:absolute; top:-24px; left:92px; transform:translateX(-1px);
    width:2px; height:24px; background:var(--line-strong);
  }

  /* lead → reports : left-branching bracket under the centered lead */
  .org-reports {
    position:relative; display:flex; flex-direction:column; gap:9px; align-items:flex-start;
    padding-top:18px; padding-left:26px;
  }
  /* horizontal link from under the lead center (92) back to the spine (12), at lead bottom */
  .org-reports::after {
    content:''; position:absolute; top:0; left:12px; width:80px; height:2px; background:var(--line);
  }
  /* vertical spine running from lead bottom down to the last report's center */
  .org-reports::before {
    content:''; position:absolute; top:0; left:12px; bottom:22px; width:2px; background:var(--line);
  }
  /* elbow from spine to each report */
  .org-reports .org-card { position:relative; }
  .org-reports .org-card::before {
    content:''; position:absolute; top:50%; left:-14px; width:14px; height:2px; background:var(--line);
  }

  /* Shimmer */
  @keyframes shimmer { 0%{background-position:-1000px 0;} 100%{background-position:1000px 0;} }
  .shimmer { background:linear-gradient(90deg,var(--bg-subtle) 0%,var(--bg-hover) 50%,var(--bg-subtle) 100%); background-size:2000px 100%; animation:shimmer 2s linear infinite; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
  .fade-up { animation:fadeUp 0.4s ease-out forwards; }

  /* Scrollbars */
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--line-strong); border-radius:5px; border:2px solid var(--bg-canvas); }
  ::-webkit-scrollbar-thumb:hover { background:var(--ink-tertiary); }
  aside ::-webkit-scrollbar-thumb { border-color:var(--bg-sidebar); }
</style>

const parseSalary = s => {
  if (!s || s === '—') return 0;
  return parseInt(s.replace(/[^0-9]/g, ''));
};
// rough progressive IRPF rate by annual gross (España, orientativo)
const irpfRate = annual => annual >= 80000 ? 0.30 : annual >= 60000 ? 0.26 : annual >= 45000 ? 0.22 : annual >= 30000 ? 0.18 : 0.14;
const SS_RATE = 0.0635; // cuota trabajador
const payrollFor = e => {
  const annual = parseSalary(e.salary);
  const bruto = annual / 12;
  const irpf = bruto * irpfRate(annual);
  const ss = bruto * SS_RATE;
  const neto = bruto - irpf - ss;
  return {
    annual,
    bruto,
    irpf,
    ss,
    neto
  };
};
